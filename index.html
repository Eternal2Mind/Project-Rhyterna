<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // Tarayıcı dilini al ve anında fırlat
        var lang = navigator.language || navigator.userLanguage;
        window.location.replace(lang.toLowerCase().includes('tr') ? "./tr/" : "./en/");
    </script>
    <meta http-equiv="refresh" content="0; url=./en/">
</head>
</html>
